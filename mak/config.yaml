session:
  work_dir: "."
  mak_dir: ".mak"
  max_concurrent_agents: 3
  lock_timeout_s: 300.0
  deadlock_check_interval_s: 5.0

planner:
  model: "claude-sonnet-4-6"
  max_retries: 3
  temperature: 0.0

# The first entry is the default agent: tasks whose plan omits an explicit
# agent_type are routed to it. The API adapters below are implemented. CLI
# adapter types (e.g. claude_code, codex) are accepted but not yet implemented —
# they resolve to a clear "not implemented" error if selected. API keys are read
# from the named env var, never stored here.
agents:
  - type: "anthropic_api"
    model: "claude-sonnet-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
    max_instances: 2
    timeout: 300
  - type: "openai_api"
    model: "gpt-4o"
    api_key_env: "OPENAI_API_KEY"
    max_instances: 2
    timeout: 300
  - type: "gemini_api"
    model: "gemini-3-pro"
    api_key_env: "GEMINI_API_KEY"
    max_instances: 2
    timeout: 300
  # - type: "claude_code"   # CLI fallback (not yet implemented)
  #   cmd: "claude"
  #   max_instances: 2
  #   timeout: 300

git:
  auto_commit: true
  auto_push: false
  commit_prefix: "[MAK]"

node_store:
  include_patterns:
    - "**/*.py"
  exclude_patterns:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/__pycache__/**"
