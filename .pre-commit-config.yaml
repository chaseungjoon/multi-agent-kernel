# Local hooks that mirror CI: ruff, mypy --strict, and pytest.
# Install with: pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check mak tests
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy --strict
        entry: mypy --strict mak
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: pytest -q
        language: system
        pass_filenames: false
        types: [python]
