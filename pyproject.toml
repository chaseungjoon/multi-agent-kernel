[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "multi-agent-kernel"
version = "0.1.0"
description = "A shared-memory-inspired orchestration kernel for concurrent multi-agent software development."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "mypy>=1.10",
    "pytest>=8.2",
    "ruff>=0.5",
]

[tool.setuptools.packages.find]
include = ["mak*"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true

[tool.ruff]
target-version = "py311"
line-length = 88
src = ["mak", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ANN", "D"]
ignore = ["D203", "D213"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
